<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Distributed Hub — site in preparation</title>
  <meta name="description" content="Координационный хаб для распределенных команд, систем и проектных пространств.">
  <meta property="og:title" content="Distributed Hub">
  <meta property="og:description" content="Координационный хаб для распределенных команд, систем и проектных пространств.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://distributedhub.space/">
  <meta name="theme-color" content="#3b6670">
  <style>
    :root { --ink: #17201f; --muted: #5d6763; --line: #d9ded7; --paper: #f7f5ef; --soft: #e9ece3; --accent: #3b6670; --warm: #c4a04d; }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: var(--paper); letter-spacing: 0; }
    body::before { content: ""; position: fixed; inset: 0; background: linear-gradient(90deg, rgba(23,32,31,.06) 1px, transparent 1px), linear-gradient(180deg, rgba(23,32,31,.05) 1px, transparent 1px); background-size: 44px 44px; mask-image: linear-gradient(120deg, rgba(0,0,0,.75), transparent 72%); pointer-events: none; }
    main { min-height: 100vh; display: grid; grid-template-columns: minmax(280px, 1fr) minmax(260px, 520px); align-items: center; gap: clamp(28px, 5vw, 72px); padding: clamp(28px, 6vw, 88px); position: relative; }
    .status { display: inline-flex; align-items: center; gap: 10px; color: var(--accent); font-size: 14px; font-weight: 700; text-transform: uppercase; }
    .status::before { content: ""; width: 10px; height: 10px; border-radius: 50%; background: var(--warm); box-shadow: 0 0 0 6px rgba(0,0,0,.04); }
    h1 { margin: 22px 0 0; max-width: 850px; font-size: clamp(44px, 8vw, 118px); line-height: .9; font-weight: 780; letter-spacing: 0; }
    .lead { max-width: 760px; margin: 28px 0 0; color: var(--muted); font-size: clamp(18px, 2.1vw, 25px); line-height: 1.45; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 34px; align-items: center; }
    a.button { min-height: 48px; display: inline-flex; align-items: center; justify-content: center; padding: 0 20px; border: 1px solid var(--ink); color: #fff; background: var(--ink); text-decoration: none; font-weight: 700; border-radius: 6px; }
    .domain { color: var(--muted); font-size: 15px; }
    .visual { width: min(100%, 520px); aspect-ratio: 1 / 1; display: grid; place-items: center; border-left: 1px solid var(--line); }
    svg { width: min(86%, 430px); height: auto; overflow: visible; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 26px; max-width: 720px; }
    .tags span { border: 1px solid var(--line); background: rgba(255,255,255,.42); border-radius: 6px; padding: 8px 10px; color: #35403d; font-size: 14px; }
    footer { position: fixed; left: clamp(28px, 6vw, 88px); right: clamp(28px, 6vw, 88px); bottom: 24px; display: flex; justify-content: space-between; gap: 20px; color: #68736f; font-size: 13px; }
    @media (max-width: 820px) { main { min-height: auto; grid-template-columns: 1fr; padding-bottom: 96px; } .visual { order: -1; border-left: 0; border-bottom: 1px solid var(--line); padding-bottom: 20px; } h1 { font-size: clamp(42px, 16vw, 74px); } footer { position: static; padding: 0 clamp(28px, 6vw, 88px) 28px; flex-direction: column; } }
  </style>
</head>
<body>
  <main>
    <section aria-label="Distributed Hub">
      <div class="status">Скоро запуск</div>
      <h1>Distributed Hub</h1>
      <p class="lead">Координационный хаб для распределенных команд, систем и проектных пространств.</p>
      <div class="tags">
            <span>distributed teams</span>
            <span>systems</span>
            <span>hub</span>
      </div>
      <div class="actions">
        <a class="button" href="mailto:hello@distributedhub.space">Связаться</a>
        <span class="domain">distributedhub.space</span>
      </div>
    </section>
    <aside class="visual" aria-label="A shared point for distributed work.">
      <svg viewBox="0 0 420 420" role="img" aria-labelledby="mark-title mark-desc">
        <title id="mark-title">Distributed Hub</title>
        <desc id="mark-desc">A shared point for distributed work.</desc>
        <rect x="34" y="34" width="352" height="352" rx="8" fill="none" stroke="var(--line)" stroke-width="2"/>
        <path d="M74 294 C126 220 154 246 202 170 C246 100 296 126 346 82" fill="none" stroke="var(--accent)" stroke-width="10" stroke-linecap="round"/>
        <path d="M72 336 H348 M72 252 H348 M72 168 H348 M72 84 H348" stroke="var(--line)" stroke-width="2"/>
        <path d="M84 72 V348 M168 72 V348 M252 72 V348 M336 72 V348" stroke="var(--line)" stroke-width="2"/>
        <circle cx="74" cy="294" r="12" fill="var(--warm)"/>
        <circle cx="202" cy="170" r="12" fill="var(--warm)"/>
        <circle cx="346" cy="82" r="12" fill="var(--warm)"/>
        <text x="210" y="230" text-anchor="middle" font-size="56" font-weight="800" fill="var(--ink)" letter-spacing="0">DH</text>
      </svg>
    </aside>
  </main>
  <footer>
    <span>A shared point for distributed work.</span>
    <span>Public presence in preparation</span>
  </footer>
</body>
</html>
